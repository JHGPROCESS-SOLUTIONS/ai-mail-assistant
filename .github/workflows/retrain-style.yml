name: Monthly retrain stale style profiles

on:
  schedule:
    - cron: '0 4 1 * *'   # elke 1ste van de maand, 04:00 UTC
  workflow_dispatch:        # manual trigger via GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: POST retrain endpoint
        run: |
          curl -sS -X POST \
            https://api.officeflowcompany.com/internal/style-profile/retrain-stale \
            -w "\n[status %{http_code}] %{time_total}s\n" \
            -o /tmp/retrain-output.json
          cat /tmp/retrain-output.json
